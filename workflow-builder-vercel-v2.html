<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>workflow.builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --tint:#fafafa;
    --text:#171717; --text-2:#4d4d4d; --muted:#666666; --faint:#808080;
    --line:#ebebeb; --ring:rgba(0,0,0,0.08); --ring-strong:rgba(0,0,0,0.16);
    --badge-bg:#ebf5ff; --badge-text:#0068d6;
    --blue:#0a72ef; --pink:#de1d8d; --red:#ff5b4f;
    --focus:hsla(212,100%,48%,1);
    --c-str:#0070f3; --c-num:#7928ca; --c-pun:#808080;
    --btn-bg:#171717; --btn-text:#ffffff;
    --r6:6px; --r8:8px;
    --sh-ring:0 0 0 1px var(--ring);
    --sh-card:0 0 0 1px rgba(0,0,0,0.08), 0 2px 2px rgba(0,0,0,0.04), 0 8px 8px -8px rgba(0,0,0,0.04), 0 0 0 1px var(--tint);
    --sans:"Geist",Arial,"Apple Color Emoji","Segoe UI Emoji",sans-serif;
    --mono:"Geist Mono",ui-monospace,SFMono-Regular,"Roboto Mono",Menlo,Monaco,"Courier New",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    font-size:16px; line-height:1.5; font-feature-settings:"liga" 1;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; min-height:100vh;
  }
  ::selection{background:rgba(10,114,239,.14)}

  header{display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:var(--bg); position:sticky; top:0; z-index:20; box-shadow:0 1px 0 0 var(--ring)}
  .brand{font-weight:600; letter-spacing:-.03em; font-size:17px}
  .brand .dim{color:var(--muted); font-weight:400}
  .head-meta{display:flex; gap:14px; align-items:center}
  .badge{display:inline-flex; align-items:center; gap:7px; background:var(--badge-bg); color:var(--badge-text); border-radius:9999px; padding:3px 11px; font-size:12px; font-weight:500}
  .badge .dot{width:6px; height:6px; border-radius:50%; background:var(--badge-text); animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .linkbtn{font-size:14px; font-weight:500; color:var(--muted); cursor:pointer; background:none; border:none; font-family:var(--sans)}
  .linkbtn:hover{color:var(--text)}

  .shell{flex:1; display:grid; grid-template-columns:minmax(0,1fr) 400px; min-height:0}
  .chatcol{position:relative; display:flex; flex-direction:column; min-height:0; min-width:0}
  .chat-scroll{flex:1; overflow-y:auto; min-height:0}
  .chat-scroll::-webkit-scrollbar{width:10px}
  .chat-scroll::-webkit-scrollbar-thumb{background:var(--line); border:3px solid var(--bg); border-radius:6px}

  /* ---------- chat ---------- */
  .chat{padding:34px 28px 104px; display:flex; flex-direction:column; gap:22px; max-width:740px; margin:0 auto; width:100%; min-height:100%}
  .chat.is-empty{justify-content:center}
  .empty-hero{display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px; animation:riseL .5s ease both}
  .hero-mark{width:54px; height:54px; border-radius:14px; background:#eef5ff; display:grid; place-items:center; box-shadow:0 0 0 1px rgba(10,114,239,.16)}
  .hero-mark svg{width:28px; height:28px; color:#5b9df7}
  .empty-hero h2{font-size:23px; font-weight:600; letter-spacing:-.03em}
  .empty-hero p{font-size:15px; color:var(--muted); max-width:340px; line-height:1.5}
  .hero-chip{margin-top:4px; font-family:var(--sans); font-size:13.5px; color:var(--text-2); background:var(--bg); box-shadow:var(--sh-ring); border:none; border-radius:9999px; padding:9px 16px; cursor:pointer; transition:box-shadow .14s}
  .hero-chip:hover{box-shadow:0 0 0 1px var(--ring-strong)}
  .turn{display:flex; will-change:transform,opacity}
  .turn.user{justify-content:flex-end; animation:riseR .44s cubic-bezier(.18,.9,.24,1) both}
  .turn.assistant{justify-content:flex-start; gap:10px; animation:riseL .44s cubic-bezier(.18,.9,.24,1) both}
  @keyframes riseR{from{opacity:0; transform:translate(10px,10px) scale(.97)} to{opacity:1; transform:none}}
  @keyframes riseL{from{opacity:0; transform:translate(-10px,10px) scale(.97)} to{opacity:1; transform:none}}

  .avatar{width:28px; height:28px; border-radius:8px; background:#eef5ff; color:#5b9df7; display:grid; place-items:center; flex:none; margin-top:2px; box-shadow:0 0 0 1px rgba(10,114,239,.16)}
  .avatar svg{width:16px; height:16px; display:block}
  .content{max-width:82%; min-width:0}

  .bubble{font-size:15.5px; line-height:1.55}
  .turn.user .bubble{background:var(--badge-bg); color:var(--text); box-shadow:0 0 0 1px rgba(10,114,239,.20); border-radius:16px 16px 4px 16px; padding:11px 16px; max-width:82%}
  .turn.assistant .bubble{background:var(--bg); box-shadow:var(--sh-ring); border-radius:4px 16px 16px 16px; padding:12px 16px; display:inline-block}
  .bubble .muted{color:var(--muted)}

  /* typing indicator */
  .typing-bubble{display:inline-flex; gap:5px; align-items:center; padding:14px 16px !important}
  .typing-bubble span{width:7px; height:7px; border-radius:50%; background:var(--faint); animation:blink 1.3s infinite both}
  .typing-bubble span:nth-child(2){animation-delay:.18s} .typing-bubble span:nth-child(3){animation-delay:.36s}
  @keyframes blink{0%,60%,100%{opacity:.25; transform:translateY(0)} 30%{opacity:1; transform:translateY(-3px)}}

  /* widgets */
  .widget{margin-top:14px; background:var(--bg); box-shadow:var(--sh-card); border-radius:var(--r8); overflow:hidden; animation:widgetIn .5s cubic-bezier(.18,.9,.24,1) both; animation-delay:.14s}
  @keyframes widgetIn{from{opacity:0; transform:translateY(10px) scale(.98)} to{opacity:1; transform:none}}
  .widget-head{padding:13px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 0 0 var(--ring)}
  .widget-title{font-family:var(--mono); text-transform:uppercase; font-size:12px; font-weight:500; letter-spacing:.05em; color:var(--muted)}
  .widget-tag{font-family:var(--mono); font-size:12px; color:var(--faint); background:var(--tint); box-shadow:var(--sh-ring); border-radius:9999px; padding:3px 10px}
  .widget-body{padding:16px}

  .btn{font-family:var(--sans); font-size:14px; font-weight:500; line-height:1.2; background:var(--btn-bg); color:var(--btn-text); border:none; border-radius:var(--r6); padding:9px 16px; cursor:pointer; transition:background .14s,transform .1s,box-shadow .14s}
  .btn:hover{background:#383838} .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--focus); outline-offset:2px}
  .btn.sm{padding:7px 13px}
  .btn.ghost{background:var(--bg); color:var(--text); box-shadow:var(--sh-ring)}
  .btn.ghost:hover{background:var(--bg); box-shadow:0 0 0 1px var(--ring-strong)}
  .btn[disabled]{opacity:.5; cursor:default}

  .connect-row{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap}
  .connect-row .lbl{display:flex; align-items:center; gap:12px}
  .appicon{width:34px; height:34px; border-radius:var(--r6); display:grid; place-items:center; font-size:12px; font-weight:600; color:#fff; flex:none}
  .appname{font-weight:500} .appdesc{font-size:14px; color:var(--muted)}
  .ok{display:none; align-items:center; gap:9px; font-size:14px; color:var(--muted); animation:popIn .4s cubic-bezier(.2,.9,.3,1.4) both}
  @keyframes popIn{from{opacity:0; transform:scale(.8)} to{opacity:1; transform:none}}
  .ok .dot{width:7px;height:7px;border-radius:50%;background:#10b981; box-shadow:0 0 0 3px rgba(16,185,129,.18)}
  .ok code{font-family:var(--mono); color:var(--text); background:var(--tint); box-shadow:var(--sh-ring); padding:2px 8px; border-radius:var(--r6); font-size:13px}
  .connected .btn{display:none} .connected .ok{display:inline-flex}

  .field{margin-bottom:14px} .field:last-child{margin-bottom:0}
  .field label{display:block; font-size:14px; font-weight:500; color:var(--muted); margin-bottom:8px}
  .control{width:100%; background:var(--bg); color:var(--text); border:none; box-shadow:var(--sh-ring); border-radius:var(--r6); padding:11px 14px; font-family:var(--sans); font-size:15px; outline:none; appearance:none; transition:box-shadow .14s}
  .control:focus{box-shadow:0 0 0 1px var(--blue), 0 0 0 4px rgba(10,114,239,.14)}
  select.control{cursor:pointer; background-image:linear-gradient(45deg,transparent 50%,var(--faint) 50%),linear-gradient(135deg,var(--faint) 50%,transparent 50%); background-position:calc(100% - 18px) 17px,calc(100% - 13px) 17px; background-size:5px 5px,5px 5px; background-repeat:no-repeat}

  .chips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px}
  .chip{font-family:var(--mono); font-size:12px; padding:6px 11px; box-shadow:var(--sh-ring); border-radius:var(--r6); color:var(--text); background:var(--bg); cursor:pointer; transition:box-shadow .14s,transform .1s}
  .chip:hover{box-shadow:0 0 0 1px var(--ring-strong)} .chip:active{transform:scale(.95)}
  .preview{margin-top:12px; padding:11px 14px; background:var(--tint); box-shadow:var(--sh-ring); border-radius:var(--r6); font-size:14px; color:var(--muted)}
  .preview b{color:var(--text); font-weight:500}

  .cond-line{display:flex; flex-wrap:wrap; align-items:center; gap:8px}
  .cond-line .kw{font-family:var(--mono); color:var(--pink); font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:.05em}
  .cond-line .control{width:auto; min-width:118px; padding:9px 12px}
  .actions{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap}

  .composer{position:absolute; left:0; right:0; bottom:0; padding:30px 28px 18px; background:linear-gradient(to top, var(--bg) 58%, rgba(255,255,255,0))}
  .composer-inner{max-width:740px; margin:0 auto; display:flex; gap:10px}
  .composer input{flex:1; background:var(--bg); color:var(--text); border:none; box-shadow:var(--sh-ring); border-radius:var(--r6); padding:13px 16px; font-family:var(--sans); font-size:15px; outline:none}
  .composer input:focus{box-shadow:0 0 0 1px var(--blue), 0 0 0 4px rgba(10,114,239,.14)}

  /* ---------- right rail / canvas ---------- */
  aside{box-shadow:-1px 0 0 0 var(--ring); background:var(--bg); display:flex; flex-direction:column}
  .rail-top{padding:16px 18px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 0 0 var(--ring)}
  .seg{display:inline-flex; background:var(--tint); box-shadow:var(--sh-ring); border-radius:var(--r8); padding:3px}
  .tab{font-size:14px; font-weight:500; color:var(--muted); cursor:pointer; padding:6px 14px; border-radius:var(--r6); line-height:1.2; transition:color .14s,background .14s}
  .tab:hover{color:var(--text)} .tab.active{color:var(--bg); background:var(--text)}
  .rail-lbl{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint)}
  .rail-body{padding:20px 18px; overflow-y:auto; flex:1}
  .empty{font-size:14px; color:var(--muted); padding:24px 2px; line-height:1.7}

  .canvas{position:relative; margin:0 auto}
  .canvas.final .gnode{animation:glow 1.1s ease}
  @keyframes glow{0%{box-shadow:var(--sh-card)} 40%{box-shadow:var(--sh-card),0 0 0 4px rgba(16,185,129,.18)} 100%{box-shadow:var(--sh-card)}}
  .edges{position:absolute; inset:0; overflow:visible; pointer-events:none}
  .edge{fill:none; stroke-width:1.6; stroke-dasharray:1; stroke-dashoffset:0; stroke-linecap:round}
  .edge.draw{animation:draw .6s ease both}
  @keyframes draw{from{stroke-dashoffset:1} to{stroke-dashoffset:0}}
  .nodes{position:relative}
  .gnode{position:absolute; background:var(--bg); box-shadow:var(--sh-card); border-radius:var(--r8); padding:11px 13px 11px 15px; display:flex; flex-direction:column; gap:3px; overflow:hidden}
  .gnode.in{animation:nodeIn .46s cubic-bezier(.2,.85,.25,1) both}
  @keyframes nodeIn{from{opacity:0; transform:scale(.85) translateY(10px)} to{opacity:1; transform:none}}
  .gnode::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px}
  .gnode.trigger::before{background:var(--blue)} .gnode.condition::before{background:var(--pink)} .gnode.action::before{background:var(--red)}
  .gtype{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; font-weight:500}
  .gnode.trigger .gtype{color:var(--blue)} .gnode.condition .gtype{color:var(--pink)} .gnode.action .gtype{color:var(--red)}
  .gtitle{font-size:14px; font-weight:500; letter-spacing:-.01em; line-height:1.25}
  .gsub{font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .elabel{position:absolute; transform:translateX(-50%); font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em; background:var(--bg); box-shadow:var(--sh-ring); border-radius:9999px; padding:2px 8px; color:var(--pink); animation:popIn .4s ease both}

  .jsonwrap{position:relative}
  .copybtn{position:absolute; top:8px; right:8px; z-index:2}
  pre.json{background:var(--tint); box-shadow:var(--sh-ring); border-radius:var(--r8); padding:16px; font-family:var(--mono); font-size:13px; line-height:1.6; overflow-x:auto; margin-top:0; white-space:pre; min-height:150px}
  pre.json::-webkit-scrollbar{height:8px} pre.json::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px}
  .json .key{color:var(--text)} .json .str{color:var(--c-str)} .json .num,.json .bool{color:var(--c-num)} .json .pun{color:var(--c-pun)} .json .cmt{color:var(--faint)}
  .finalbar{margin-top:12px; padding-top:14px; box-shadow:0 -1px 0 0 var(--ring); display:flex; align-items:center; justify-content:space-between; gap:10px}
  .stat{font-family:var(--mono); font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em}
  .stat.ok{color:#0a8a4d}
  .panel{display:none} .panel.active{display:block}

  @media (max-width:920px){ .shell{grid-template-columns:1fr} aside{display:none} }
</style>
</head>
<body>

<header>
  <div class="brand">workflow<span class="dim">.builder</span></div>
  <div class="head-meta">
    <span class="badge"><span class="dot"></span> session active</span>
    <button class="linkbtn" onclick="resetAll()">Reset</button>
  </div>
</header>

<div class="shell">
  <section class="chatcol">
    <div class="chat-scroll">
      <div class="chat" id="chat"></div>
    </div>
    <div class="composer">
      <div class="composer-inner">
        <input id="msg" placeholder="Type 'finalize', or use the widgets above…" onkeydown="if(event.key==='Enter')send()">
        <button class="btn" onclick="send()">Send</button>
      </div>
    </div>
  </section>

  <aside>
    <div class="rail-top">
      <div class="seg">
        <div class="tab active" data-p="p-flow" onclick="tab(this)">Canvas</div>
        <div class="tab" data-p="p-json" onclick="tab(this)">JSON</div>
      </div>
      <span class="rail-lbl" id="rail-lbl">workflow</span>
    </div>
    <div class="rail-body">
      <div class="panel active" id="p-flow"><div id="summary"></div></div>
      <div class="panel" id="p-json">
        <div class="jsonwrap">
          <button class="btn sm ghost copybtn" onclick="copyJson()">Copy</button>
          <pre class="json" id="jsonout"></pre>
        </div>
        <div class="finalbar"><span class="stat" id="jstat">building</span></div>
      </div>
    </div>
  </aside>
</div>

<script>
const SCENARIO="Post a summary to Slack every time a new row is added to a Google Sheet.";
const AV='<svg viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M208,144a15.78,15.78,0,0,1-10.42,14.94L146,178l-19,51.62a15.92,15.92,0,0,1-29.88,0L78,178l-51.62-19a15.92,15.92,0,0,1,0-29.88L78,110l19-51.62a15.92,15.92,0,0,1,29.88,0L146,110l51.62,19A15.78,15.78,0,0,1,208,144ZM152,48h16V64a8,8,0,0,0,16,0V48h16a8,8,0,0,0,0-16H184V16a8,8,0,0,0-16,0V32H152a8,8,0,0,0,0,16Zm88,32h-8V72a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16h8v8a8,8,0,0,0,16,0V96h8a8,8,0,0,0,0-16Z"></path></svg>';
let wf, lastSig='', started=false;
function initState(){ wf={ trigger:null, condition:null, action:null, finalized:false }; }

/* ---------- chat ---------- */
const chat=document.getElementById('chat');
function scrollDown(){ const p=chat.parentElement; setTimeout(()=>p.scrollTo({top:p.scrollHeight,behavior:'smooth'}),70); }
function appendUser(text){
  const t=document.createElement('div'); t.className='turn user';
  t.innerHTML='<div class="bubble"></div>'; t.querySelector('.bubble').textContent=text;
  chat.appendChild(t); scrollDown();
}
function appendAssistant(html){
  const t=document.createElement('div'); t.className='turn assistant';
  t.innerHTML='<div class="avatar">'+AV+'</div><div class="content">'+html+'</div>';
  chat.appendChild(t); scrollDown(); return t;
}
let typingEl=null;
function showTyping(){
  typingEl=document.createElement('div'); typingEl.className='turn assistant';
  typingEl.innerHTML='<div class="avatar">'+AV+'</div><div class="content"><div class="bubble typing-bubble"><span></span><span></span><span></span></div></div>';
  chat.appendChild(typingEl); scrollDown();
}
function clearTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } }
function botSay(html, after, delay){
  showTyping();
  setTimeout(()=>{ clearTyping(); appendAssistant(html); if(after) after(); }, delay||820);
}

/* ---------- stages ---------- */
function showEmpty(){
  started=false; chat.classList.add('is-empty');
  chat.innerHTML='<div class="empty-hero"><div class="hero-mark">'+AV+'</div>'
    +'<h2>What should we automate?</h2>'
    +'<p>Describe a workflow in the message box below and I\'ll build it step by step.</p>'
    +'<button class="hero-chip" onclick="useExample()">Post a summary to Slack when a new row is added to a Sheet</button></div>';
}
function useExample(){ const i=document.getElementById('msg'); i.value=SCENARIO; i.focus(); }
function triggerConnect(){ return `<div class="bubble">Let's build it. First the <span class="muted">trigger</span> — I'll watch a Google Sheet for new rows. Connect the account to continue.</div>
  <div class="widget" id="w-gs">
    <div class="widget-head"><span class="widget-title">Connect app</span><span class="widget-tag">trigger · auth</span></div>
    <div class="widget-body"><div class="connect-row">
      <div class="lbl"><span class="appicon" style="background:#0f9d58">GS</span><span><span class="appname">Google Sheets</span><br><span class="appdesc">via Pipedream Connect</span></span></div>
      <button class="btn sm" onclick="connectGS()">Connect</button>
      <span class="ok"><span class="dot"></span> connected <code>apn_g7x2</code></span>
    </div></div></div>`; }
function connectGS(){
  const w=document.getElementById('w-gs'), b=w.querySelector('.btn');
  b.textContent='Connecting…'; b.disabled=true;
  setTimeout(()=>{
    w.classList.add('connected');
    wf.trigger={ app:'google_sheets', component:'new_row_added', auth:{provider:'pipedream',account_id:'apn_g7x2',external_user_id:'user_42'}, config:{spreadsheet:'Q3 Sales Pipeline',worksheet:'Leads'} };
    render(); botSay(triggerConfig());
  },680);
}
function triggerConfig(){ return `<div class="bubble">Connected. Which spreadsheet and worksheet should I watch?</div>
  <div class="widget">
    <div class="widget-head"><span class="widget-title">Configure trigger</span><span class="widget-tag">google_sheets · new_row</span></div>
    <div class="widget-body">
      <div class="field"><label>Spreadsheet</label><select class="control" onchange="wf.trigger.config.spreadsheet=this.value;render()"><option>Q3 Sales Pipeline</option><option>Marketing Spend</option><option>Inventory 2026</option></select></div>
      <div class="field"><label>Worksheet</label><select class="control" onchange="wf.trigger.config.worksheet=this.value;render()"><option>Leads</option><option>Closed</option></select></div>
      <div class="actions"><button class="btn sm" onclick="this.closest('.widget').style.opacity=.5;botSay(condition())">Use this</button></div>
    </div></div>`; }
function condition(){ return `<div class="bubble">Want to branch on a value before posting? <span class="muted">Optional.</span></div>
  <div class="widget" id="w-cond">
    <div class="widget-head"><span class="widget-title">Condition</span><span class="widget-tag">optional branch</span></div>
    <div class="widget-body">
      <div class="cond-line"><span class="kw">if</span>
        <select class="control" id="c-field"><option>Deal Size</option><option>Stage</option><option>Company Name</option></select>
        <select class="control" id="c-op" style="min-width:92px"><option value="gt">&gt;</option><option value="eq">=</option><option value="lt">&lt;</option><option value="contains">contains</option></select>
        <input class="control" id="c-val" style="width:116px" value="10000"></div>
      <div class="preview">→ <b>true</b> posts to your channel · <b>false</b> routes to a fallback</div>
      <div class="actions"><button class="btn sm" onclick="addCondition()">Add condition</button><button class="btn sm ghost" onclick="skipCondition()">Skip — send every row</button></div>
    </div></div>`; }
function addCondition(){
  const f=document.getElementById('c-field').value, op=document.getElementById('c-op').value;
  let v=document.getElementById('c-val').value.trim(); const num=Number(v.replace(/,/g,'')); if(!isNaN(num)&&v!=='') v=num;
  wf.condition={field:f,op:op,value:v}; document.getElementById('w-cond').style.opacity=.5; render(); botSay(slackConnect());
}
function skipCondition(){ wf.condition=null; document.getElementById('w-cond').style.opacity=.5; render(); botSay(slackConnect()); }
function slackConnect(){ return `<div class="bubble">Now the Slack action. Connect Slack to continue.</div>
  <div class="widget" id="w-sl">
    <div class="widget-head"><span class="widget-title">Connect app</span><span class="widget-tag">action · auth</span></div>
    <div class="widget-body"><div class="connect-row">
      <div class="lbl"><span class="appicon" style="background:#4a154b">SL</span><span><span class="appname">Slack</span><br><span class="appdesc">via Pipedream Connect</span></span></div>
      <button class="btn sm" onclick="connectSlack()">Connect</button>
      <span class="ok"><span class="dot"></span> connected <code>apn_s4k9</code></span>
    </div></div></div>`; }
function connectSlack(){
  const w=document.getElementById('w-sl'), b=w.querySelector('.btn');
  b.textContent='Connecting…'; b.disabled=true;
  setTimeout(()=>{
    w.classList.add('connected');
    wf.action={ app:'slack', component:'send_message', auth:{provider:'pipedream',account_id:'apn_s4k9',external_user_id:'user_42'}, config:{channel:'#sales-updates', text:"New lead: {{row['Company Name']}} — \${{row['Deal Size']}} — Stage: {{row.Stage}}"} };
    render(); botSay(message());
  },680);
}
function message(){ return `<div class="bubble">Pick a channel and compose the message — I can map fields from the new row.</div>
  <div class="widget">
    <div class="widget-head"><span class="widget-title">Message template</span><span class="widget-tag">slack · send_message</span></div>
    <div class="widget-body">
      <div class="field"><label>Channel</label><select class="control" onchange="wf.action.config.channel=this.value;render()"><option>#sales-updates</option><option>#general</option><option>#sales-log</option></select></div>
      <div class="field"><label>Insert field</label>
        <div class="chips"><span class="chip" onclick="insertField('Company Name')">Company Name</span><span class="chip" onclick="insertField('Deal Size')">Deal Size</span><span class="chip" onclick="insertField('Stage')">Stage</span></div>
        <input class="control" id="tpl" oninput="onTpl()" value="New lead: {Company Name} — \${Deal Size} — Stage: {Stage}">
        <div class="preview" id="tplprev"></div></div>
      <div class="actions"><button class="btn sm" onclick="this.closest('.widget').style.opacity=.5;botSay(review())">Use this template</button></div>
    </div></div>`; }
function insertField(f){ const t=document.getElementById('tpl'); t.value+=(t.value.endsWith(' ')||t.value===''?'':' ')+'{'+f+'}'; onTpl(); t.focus(); }
function onTpl(){
  const raw=document.getElementById('tpl').value;
  wf.action.config.text=raw.replace(/\{([^}]+)\}/g,(m,p1)=>"{{row['"+p1.trim()+"']}}");
  const s={'Company Name':'Acme Co','Deal Size':'24,000','Stage':'Negotiation'};
  const pv=document.getElementById('tplprev'); if(pv) pv.innerHTML=raw.replace(/\{([^}]+)\}/g,(m,p1)=>'<b>'+(s[p1.trim()]||p1.trim())+'</b>');
  render();
}
function review(){ return `<div class="bubble">Workflow's complete — see the canvas on the right. Finalize to lock the deterministic definition.</div>
  <div class="actions" style="margin-top:6px"><button class="btn sm" onclick="finalize()">Finalize workflow</button></div>`; }
function finalize(){
  wf.finalized=true; render();
  const cv=document.querySelector('.canvas'); if(cv){ cv.classList.add('final'); }
  document.querySelector('.tab[data-p="p-json"]').click();
  botSay(`<div class="bubble">Done. The JSON is runner-ready — auth stored as Pipedream account references, branches and field mappings fully resolved.</div>`);
}

/* ---------- composer ---------- */
function send(){
  const i=document.getElementById('msg'), v=i.value.trim(); if(!v) return;
  if(!started){ started=true; chat.classList.remove('is-empty'); chat.innerHTML=''; appendUser(v); i.value=''; botSay(triggerConnect()); return; }
  appendUser(v); i.value='';
  const low=v.toLowerCase();
  if(low.includes('final')&&wf.action&&wf.action.config){ botSay('<div class="bubble">Locking it in.</div>',finalize,600); }
  else if(low.includes('reset')||low.includes('start over')){ resetAll(); }
  else { botSay('<div class="bubble"><span class="muted">In this prototype the intent parsing is scripted — use the widgets above to build, or type "finalize" once the action is set. A live build would route this through the LLM.</span></div>'); }
}

/* ---------- canvas (UML-style flow diagram) ---------- */
function render(){ renderCanvas(); renderJson(); }
function edgePath(f,t){ const dy=Math.max(18,(t.y-f.y)*0.5); return `M ${f.x} ${f.y} C ${f.x} ${f.y+dy} ${t.x} ${t.y-dy} ${t.x} ${t.y}`; }
function renderCanvas(){
  const host=document.getElementById('summary');
  if(!wf.trigger){ host.innerHTML='<div class="empty">No steps yet.<br>Connect the trigger to begin — the diagram draws itself here, live, as you build.</div>'; lastSig=''; return; }
  const W=344, NW=160, NH=74, gap=44;
  const cx=W/2;
  const nodes=[], edges=[], labels=[];
  let y=6;
  const t=wf.trigger;
  nodes.push({id:'trg',type:'trigger',x:cx-NW/2,y,t:'New row',s:'Sheets · '+t.config.spreadsheet});
  const trgBot={x:cx,y:y+NH};
  if(wf.condition){
    const cy=y+NH+gap;
    const c=wf.condition, sym={gt:'>',lt:'<',eq:'=',contains:'∋'}[c.op];
    nodes.push({id:'cnd',type:'condition',x:cx-NW/2,y:cy,t:'Condition',s:c.field+' '+sym+' '+c.value});
    edges.push({f:trgBot,t:{x:cx,y:cy},c:'blue'});
    const by=cy+NH+gap+8, lX=4, rX=W-4-NW;
    if(wf.action){
      nodes.push({id:'a1',type:'action',x:lX,y:by,t:'Send message',s:wf.action.config.channel});
      nodes.push({id:'a2',type:'action',x:rX,y:by,t:'Fallback',s:'#sales-log'});
      const cBot={x:cx,y:cy+NH};
      edges.push({f:cBot,t:{x:lX+NW/2,y:by},c:'pink'});
      edges.push({f:cBot,t:{x:rX+NW/2,y:by},c:'pink'});
      labels.push({x:lX+NW/2,y:by-12,txt:'true'}); labels.push({x:rX+NW/2,y:by-12,txt:'false'});
    }
  } else if(wf.action){
    const ay=y+NH+gap;
    nodes.push({id:'a1',type:'action',x:cx-NW/2,y:ay,t:'Send message',s:wf.action.config.channel});
    edges.push({f:trgBot,t:{x:cx,y:ay},c:'blue'});
  }
  const H=Math.max(...nodes.map(n=>n.y+NH))+8;
  const sig=nodes.map(n=>n.id).join('-');
  const animate=sig!==lastSig; lastSig=sig;
  const A=animate?' draw':'', NA=animate?' in':'';
  let svg=`<svg class="edges" width="${W}" height="${H}"><defs>
    <marker id="ab" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="var(--blue)"/></marker>
    <marker id="ap" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="var(--pink)"/></marker></defs>`;
  edges.forEach((e,i)=>{ const col=e.c==='blue'?'var(--blue)':'var(--pink)'; const mk=e.c==='blue'?'ab':'ap';
    svg+=`<path class="edge${A}" pathLength="1" d="${edgePath(e.f,e.t)}" stroke="${col}" marker-end="url(#${mk})" style="animation-delay:${0.18+i*0.08}s"></path>`; });
  svg+=`</svg>`;
  let nh=`<div class="nodes" style="width:${W}px;height:${H}px">`;
  nodes.forEach((n,i)=>{ nh+=`<div class="gnode ${n.type}${NA}" style="left:${n.x}px;top:${n.y}px;width:${NW}px;animation-delay:${i*0.08}s">
    <span class="gtype">${n.type}</span><span class="gtitle">${n.t}</span><span class="gsub">${n.s}</span></div>`; });
  labels.forEach(l=>{ nh+=`<div class="elabel" style="left:${l.x}px;top:${l.y}px">${l.txt}</div>`; });
  nh+=`</div>`;
  host.innerHTML=`<div class="canvas${wf.finalized?' final':''}" style="width:${W}px;height:${H}px">${svg}${nh}</div>`;
}

/* ---------- json ---------- */
function buildJsonObject(){
  if(!wf.trigger) return null;
  const steps=[]; const triggerNext=wf.condition?'cnd_1':(wf.action?'act_1':null);
  const obj={ workflow:{ id:'wf_8f3a2c', name:'Sheet row → Slack summary', version:'1.0',
    trigger:{ id:'trg_1', type:'trigger', app:wf.trigger.app, component:wf.trigger.component, auth:wf.trigger.auth, config:{spreadsheet:wf.trigger.config.spreadsheet,worksheet:wf.trigger.config.worksheet}, next:triggerNext }, steps } };
  if(wf.condition) obj.workflow.steps.push({ id:'cnd_1', type:'condition', expression:{left:"{{trigger.row['"+wf.condition.field+"']}}",op:wf.condition.op,right:wf.condition.value}, on_true:'act_1', on_false:'act_2' });
  if(wf.action){
    obj.workflow.steps.push({ id:'act_1', type:'action', app:wf.action.app, component:wf.action.component, auth:wf.action.auth, config:{channel:wf.action.config.channel,text:wf.action.config.text}, next:null });
    if(wf.condition) obj.workflow.steps.push({ id:'act_2', type:'action', app:'slack', component:'send_message', auth:wf.action.auth, config:{channel:'#sales-log',text:"{{row['Company Name']}} logged (below threshold)"}, next:null });
  }
  return obj;
}
function renderJson(){
  const obj=buildJsonObject(), out=document.getElementById('jsonout'), stat=document.getElementById('jstat');
  document.getElementById('rail-lbl').textContent = document.querySelector('.tab.active').dataset.p==='p-json'?'definition':'workflow';
  if(!obj){ out.innerHTML='<span class="cmt">// workflow definition appears here as you build</span>'; stat.textContent='building'; stat.className='stat'; return; }
  out.innerHTML=highlight(JSON.stringify(obj,null,2));
  if(wf.finalized){ stat.textContent='✓ finalized · runner-ready'; stat.className='stat ok'; }
  else { stat.textContent='draft · '+(obj.workflow.steps.length+1)+' nodes'; stat.className='stat'; }
}
function highlight(json){
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(?:\\.|[^"\\])*"\s*:?|\b(?:true|false|null)\b|-?\d+(?:\.\d+)?)/g,m=>{ let cls='num'; if(/^"/.test(m)) cls=/:\s*$/.test(m)?'key':'str'; else if(/true|false|null/.test(m)) cls='bool'; return '<span class="'+cls+'">'+m+'</span>'; })
    .replace(/([{}\[\],])/g,'<span class="pun">$1</span>');
}
function copyJson(){ const obj=buildJsonObject(); if(!obj) return; navigator.clipboard&&navigator.clipboard.writeText(JSON.stringify(obj,null,2)); const b=event.target,o=b.textContent; b.textContent='Copied'; setTimeout(()=>{b.textContent=o;},1100); }

/* ---------- tabs / reset ---------- */
function tab(el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); el.classList.add('active'); document.getElementById(el.dataset.p).classList.add('active'); renderJson(); }
function resetAll(){ clearTyping(); initState(); lastSig=''; render(); document.querySelector('.tab[data-p="p-flow"]').click(); showEmpty(); }

/* ---------- boot: empty by default; user sends the first message ---------- */
initState(); render(); showEmpty();
</script>
</body>
